name: Auto Visit

on:
  schedule:
    - cron: "0 17 * * *"   # 中国 01:00
    - cron: "0 1 * * *"    # 中国 09:00
    - cron: "0 8 * * *"    # 中国 16:00
    - cron: "0 14 * * *"   # 中国 22:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py
        
